<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Plate Recognition — CV Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e293b;
            --accent: #6366f1;
            --accent-2: #8b5cf6;
            --plate-bg: #fbbf24;
            --plate-border: #1f2937;
            --card-bg: rgba(255, 255, 255, 0.97);
            --text-soft: #475569;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 50%, #312e81 100%);
            background-attachment: fixed;
            color: #0f172a;
        }

        .hero {
            text-align: center;
            color: #fff;
            padding: 48px 16px 32px;
        }

        .hero h1 {
            font-weight: 800;
            font-size: 2.4rem;
            margin: 0 0 8px;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #fff 0%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: #cbd5e1;
            margin: 0;
            font-size: 1.05rem;
        }

        .panel {
            max-width: 1100px;
            margin: 0 auto 56px;
            padding: 0 16px;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
        }

        .form-card { padding: 28px 32px; }

        .form-card label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-soft);
            margin-bottom: 6px;
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            padding: 12px 14px;
            font-weight: 500;
            transition: border-color .15s, box-shadow .15s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .btn-run {
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 22px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.02em;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.35);
            transition: transform .12s, box-shadow .12s, opacity .12s;
            width: 100%;
        }

        .btn-run:hover { transform: translateY(-1px); box-shadow: 0 12px 26px rgba(99, 102, 241, 0.45); color: #fff; }
        .btn-run:active { transform: translateY(0); }
        .btn-run:disabled { opacity: 0.6; cursor: not-allowed; }

        .loading-state {
            display: none;
            text-align: center;
            margin-top: 24px;
            color: var(--text-soft);
        }

        .results { display: none; margin-top: 28px; }

        /* === HERO RESULT BANNER === */
        .plate-hero {
            background: linear-gradient(135deg, #1e293b 0%, #312e81 100%);
            border-radius: 20px;
            padding: 28px 32px;
            color: #fff;
            margin-bottom: 24px;
            box-shadow: 0 20px 50px rgba(2, 6, 23, 0.5);
        }

        .plate-hero .label {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: #a5b4fc;
            margin-bottom: 14px;
        }

        .plate-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 700px) {
            .plate-row { grid-template-columns: 1fr; }
        }

        .plate {
            background: var(--plate-bg);
            color: #1f2937;
            border: 4px solid var(--plate-border);
            border-radius: 12px;
            padding: 18px 18px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: 0.18em;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 78px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .15s;
        }

        .plate::before {
            content: attr(data-engine);
            position: absolute;
            top: 6px;
            left: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #1f2937;
            opacity: 0.55;
        }

        .plate.empty {
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            border-color: rgba(255, 255, 255, 0.18);
            font-size: 1rem;
            letter-spacing: 0.05em;
        }

        .plate.empty::before { color: #cbd5e1; opacity: 0.7; }

        .plate-list {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .plate-list-item {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: #e0e7ff;
        }

        .plate-list-item .idx {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            color: #a5b4fc;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .summary-empty {
            text-align: center;
            color: #cbd5e1;
            padding: 14px;
            font-style: italic;
        }

        /* === IMAGES === */
        .images-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        @media (max-width: 800px) {
            .images-grid { grid-template-columns: 1fr; }
        }

        .image-card { padding: 18px; }
        .image-card h6 {
            font-weight: 700;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-soft);
            margin: 0 0 12px;
        }

        .image-card img {
            width: 100%;
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            display: block;
        }

        /* === JSON SECTION === */
        .json-card {
            margin-top: 24px;
            padding: 22px 24px;
        }

        .json-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .json-header h6 {
            font-weight: 700;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-soft);
            margin: 0;
        }

        .json-actions { display: flex; gap: 8px; }

        .btn-mini {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #334155;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .12s;
        }

        .btn-mini:hover { background: #e2e8f0; }

        .json-pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 18px 20px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.55;
            max-height: 460px;
            overflow: auto;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .json-pre .key { color: #93c5fd; }
        .json-pre .str { color: #fbbf24; }
        .json-pre .num { color: #86efac; }
        .json-pre .bool { color: #f472b6; }

        .badge-pill {
            display: inline-block;
            background: rgba(99, 102, 241, 0.12);
            color: var(--accent);
            border-radius: 999px;
            padding: 4px 12px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .meta-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .toast-mini {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #0f172a;
            color: #fff;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity .2s, transform .2s;
            pointer-events: none;
            z-index: 1000;
        }

        .toast-mini.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
<div class="hero">
    <h1>🚗 License Plate Recognition</h1>
    <p>Детекция + OCR — своё решение (CRNN) и готовое (EasyOCR)</p>
</div>

<div class="panel">
    <div class="glass form-card">
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Детектор</label>
                    <select id="modelSelect" class="form-select" required>
                        <option value="yolov8n.pt">YOLOv8n — детекция + OCR</option>
                        <option value="yolo26n.pt">YOLO26n — детекция + OCR</option>
                        <option value="frcnn_v2.pt">Faster R-CNN v2 — детекция + OCR</option>
                        <option value="ssd_v2.pt">SSD v2 — детекция + OCR</option>
                        <option value="crnn.pt">CRNN — только OCR (своё решение)</option>
                        <option value="easyocr">EasyOCR — только OCR (готовое решение)</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">OCR-движок</label>
                    <select id="ocrSelect" class="form-select">
                        <option value="both" selected>Оба: CRNN (custom) + EasyOCR (existing)</option>
                        <option value="crnn">Только CRNN (своё решение)</option>
                        <option value="easyocr">Только EasyOCR (готовое решение)</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Изображение</label>
                    <input type="file" id="imageInput" class="form-control" accept="image/*" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn-run" id="submitBtn">🚀 Распознать номер</button>
                </div>
            </div>
        </form>

        <div id="loading" class="loading-state">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 mb-0">Модель работает… 5–15 секунд</p>
        </div>
    </div>

    <div id="result" class="results">
        <!-- Hero plate banner -->
        <div class="plate-hero">
            <div class="label" id="resultLabel">Распознанный номер</div>
            <div id="primaryPlateArea"></div>
            <div id="plateList" class="plate-list"></div>
        </div>

        <!-- Images side-by-side -->
        <div class="images-grid">
            <div class="glass image-card">
                <h6>Оригинал</h6>
                <img id="originalImg" alt="original">
            </div>
            <div class="glass image-card">
                <h6>Аннотированный результат</h6>
                <img id="resultImg" alt="result">
            </div>
        </div>

        <!-- JSON section -->
        <div class="glass json-card">
            <div class="json-header">
                <h6>JSON ответ от API</h6>
                <div class="json-actions">
                    <button type="button" class="btn-mini" id="copyJsonBtn">📋 Скопировать</button>
                    <button type="button" class="btn-mini" id="toggleJsonBtn">👁 Скрыть</button>
                </div>
            </div>
            <div class="meta-row" id="metaRow"></div>
            <pre id="jsonResult" class="json-pre"></pre>
        </div>
    </div>
</div>

<div id="toast" class="toast-mini">Скопировано в буфер</div>

<script>
    const form = document.getElementById('uploadForm');
    const loading = document.getElementById('loading');
    const resultDiv = document.getElementById('result');
    const originalImg = document.getElementById('originalImg');
    const resultImg = document.getElementById('resultImg');
    const jsonResult = document.getElementById('jsonResult');
    const submitBtn = document.getElementById('submitBtn');
    const primaryPlateArea = document.getElementById('primaryPlateArea');
    const plateList = document.getElementById('plateList');
    const resultLabel = document.getElementById('resultLabel');
    const metaRow = document.getElementById('metaRow');
    const toast = document.getElementById('toast');

    const showToast = (msg) => {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1800);
    };

    const escapeHtml = (s) => String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    const highlightJson = (obj) => {
        const json = JSON.stringify(obj, null, 2);
        return escapeHtml(json)
            .replace(/("(\\u[\da-f]{4}|\\[^u]|[^\\"])*")\s*:/g, '<span class="key">$1</span>:')
            .replace(/:\s*("(\\u[\da-f]{4}|\\[^u]|[^\\"])*")/g, ': <span class="str">$1</span>')
            .replace(/:\s*(-?\d+(?:\.\d+)?)/g, ': <span class="num">$1</span>')
            .replace(/:\s*(true|false|null)/g, ': <span class="bool">$1</span>');
    };

    const buildPlate = (text, engine) => {
        const safe = text && String(text).trim() ? String(text).toUpperCase() : '';
        const cls = safe ? 'plate' : 'plate empty';
        const display = safe || 'не распознано';
        return `<div class="${cls}" data-engine="${escapeHtml(engine)}">${escapeHtml(display)}</div>`;
    };

    const renderPlates = (prediction) => {
        primaryPlateArea.innerHTML = '';
        plateList.innerHTML = '';
        metaRow.innerHTML = '';

        if (!prediction || prediction.error) {
            resultLabel.textContent = 'Ошибка';
            primaryPlateArea.innerHTML = `<div class="summary-empty">${escapeHtml(prediction?.error || 'Не удалось обработать')}</div>`;
            return;
        }

        // Build meta badges
        const badges = [];
        if (prediction.type) badges.push(`type: ${prediction.type}`);
        if (prediction.model) badges.push(`detector: ${prediction.model}`);
        if (prediction.engine) badges.push(`engine: ${prediction.engine}`);
        if (prediction.ocr_engine) badges.push(`ocr: ${prediction.ocr_engine}`);
        if (Array.isArray(prediction.boxes)) badges.push(`найдено: ${prediction.boxes.length}`);
        if (Array.isArray(prediction.recognitions)) badges.push(`распознано: ${prediction.recognitions.length}`);
        metaRow.innerHTML = badges.map(b => `<span class="badge-pill">${escapeHtml(b)}</span>`).join('');

        // Pure OCR result (single text)
        if (prediction.type === 'ocr') {
            resultLabel.textContent = 'Распознанный номер';
            const eng = prediction.engine || 'OCR';
            primaryPlateArea.innerHTML = `<div class="plate-row">${buildPlate(prediction.text, eng)}</div>`;
            return;
        }

        // Detection + OCR result
        if (prediction.type === 'detection_ocr') {
            const recs = prediction.recognitions || [];
            if (recs.length === 0) {
                resultLabel.textContent = 'Номера не найдены';
                primaryPlateArea.innerHTML = `<div class="summary-empty">Детектор не обнаружил номерных знаков на изображении</div>`;
                return;
            }

            // Show first recognition prominently with both engines side-by-side
            resultLabel.textContent = recs.length === 1 ? 'Распознанный номер' : `Главный номер (1 из ${recs.length})`;
            const first = recs[0];
            const cells = [];
            if ('crnn' in first) cells.push(buildPlate(first.crnn, 'CRNN (custom)'));
            if ('easyocr' in first) cells.push(buildPlate(first.easyocr, 'EasyOCR (existing)'));
            primaryPlateArea.innerHTML = `<div class="plate-row">${cells.join('')}</div>`;

            // Additional plates (if multiple)
            if (recs.length > 1) {
                plateList.innerHTML = recs.slice(1).map((r, i) => {
                    const parts = [];
                    if (r.crnn) parts.push(`<b>CRNN:</b> ${escapeHtml(r.crnn.toUpperCase())}`);
                    if (r.easyocr) parts.push(`<b>OCR:</b> ${escapeHtml(r.easyocr.toUpperCase())}`);
                    return `<div class="plate-list-item"><span class="idx">#${i + 2}</span><span>${parts.join(' &nbsp;|&nbsp; ') || '—'}</span></div>`;
                }).join('');
            }
            return;
        }

        // Fallback
        resultLabel.textContent = 'Результат';
        primaryPlateArea.innerHTML = `<div class="summary-empty">Неизвестный формат ответа</div>`;
    };

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const model = document.getElementById('modelSelect').value;
        const ocrEngine = document.getElementById('ocrSelect').value;
        const fileInput = document.getElementById('imageInput');
        const file = fileInput.files[0];
        if (!file) return showToast('Выберите изображение');

        loading.style.display = 'block';
        resultDiv.style.display = 'none';
        submitBtn.disabled = true;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('model_name', model);
        formData.append('ocr_engine', ocrEngine);

        try {
            const res = await fetch('/predict', { method: 'POST', body: formData });
            if (!res.ok) throw new Error('Ошибка сервера');
            const data = await res.json();

            originalImg.src = data.original_image;
            resultImg.src = data.annotated_image || data.result_image;

            renderPlates(data.prediction);
            jsonResult.innerHTML = highlightJson(data.prediction);
            jsonResult.dataset.raw = JSON.stringify(data.prediction, null, 2);

            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (err) {
            showToast('Ошибка: ' + err.message);
        } finally {
            loading.style.display = 'none';
            submitBtn.disabled = false;
        }
    });

    document.getElementById('copyJsonBtn').addEventListener('click', async () => {
        const raw = jsonResult.dataset.raw || jsonResult.textContent;
        try {
            await navigator.clipboard.writeText(raw);
            showToast('JSON скопирован');
        } catch {
            showToast('Не удалось скопировать');
        }
    });

    document.getElementById('toggleJsonBtn').addEventListener('click', (e) => {
        const visible = jsonResult.style.display !== 'none';
        jsonResult.style.display = visible ? 'none' : 'block';
        e.target.textContent = visible ? '👁 Показать' : '👁 Скрыть';
    });
</script>
</body>
</html>
